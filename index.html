<html lang="uk">
<head>

<title>Kasta — Аналітика продажів 2026</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a1a2e;font-size:14px}
.topbar{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 100%);color:#fff;padding:14px 24px;display:flex;align-items:center;gap:16px;flex-wrap:wrap}
.topbar h1{font-size:18px;font-weight:700;letter-spacing:.5px}
.topbar h1 span{color:#f7b731}
.filters{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-left:auto}
.filter-wrap{position:relative}
.filter-btn{background:#2d3561;color:#fff;padding:7px 14px;border-radius:8px;border:none;cursor:pointer;font-size:13px;white-space:nowrap;display:flex;align-items:center;gap:6px}
.filter-btn:hover{background:#3d4880}
.dropdown{display:none;position:absolute;top:110%;right:0;background:#fff;border-radius:10px;box-shadow:0 8px 32px rgba(0,0,0,.18);z-index:999;min-width:220px;padding:8px 0}
.dropdown.open{display:block}
.dd-item{padding:9px 16px;cursor:pointer;font-size:13px;color:#333;display:flex;align-items:center;gap:8px;transition:background .15s}
.dd-item:hover{background:#f5f6fa}
.dd-item input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:#f7b731}
.dd-divider{height:1px;background:#eee;margin:4px 0}
.dd-search{padding:8px 12px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fff}
.dd-search input{width:100%;padding:5px 8px;border:1px solid #ddd;border-radius:6px;font-size:13px}
.dd-actions{display:flex;gap:8px;padding:8px 12px;border-top:1px solid #eee;background:#fff}
.dd-actions button{flex:1;padding:6px;font-size:12px;border-radius:6px;border:none;cursor:pointer}
.btn-all{background:#e8f0fe;color:#1a73e8}.btn-none{background:#fce8e6;color:#d93025}.btn-apply{background:#1a73e8;color:#fff}
.badge{background:#f7b731;color:#1a1a2e;font-size:11px;padding:2px 7px;border-radius:12px;font-weight:700;margin-left:4px}
.tabs{display:flex;gap:0;background:#fff;border-bottom:2px solid #e0e4ef;padding:0 24px;overflow-x:auto}
.tab{padding:12px 18px;cursor:pointer;font-size:13px;font-weight:600;color:#666;border-bottom:3px solid transparent;white-space:nowrap;transition:all .2s}
.tab.active{color:#1a1a2e;border-bottom-color:#f7b731}
.tab:hover{color:#1a1a2e;background:#f9f9fb}
.page{display:none;padding:20px 24px}
.page.active{display:block}
.kpis{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:20px}
.kpi{background:#fff;border-radius:12px;padding:16px 20px;flex:1;min-width:140px;box-shadow:0 1px 4px rgba(0,0,0,.07)}
.kpi .lbl{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.kpi .val{font-size:22px;font-weight:700}
.kpi .sub{font-size:12px;color:#888;margin-top:3px}
.kpi.hi{border-left:4px solid #f7b731}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:#fff;border-radius:12px;padding:18px;box-shadow:0 1px 4px rgba(0,0,0,.07);margin-bottom:16px}
.card h3{font-size:13px;font-weight:700;color:#444;margin-bottom:14px}
.full{grid-column:1/-1}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f7f8fc;padding:9px 10px;text-align:left;font-weight:600;font-size:12px;color:#555;border-bottom:2px solid #e0e4ef;cursor:pointer;white-space:nowrap;user-select:none}
th:hover{background:#eef0f8}
th.asc::after{content:" ▲";font-size:10px}
th.desc::after{content:" ▼";font-size:10px}
td{padding:8px 10px;border-bottom:1px solid #f0f2f5;vertical-align:middle}
tr:hover td{background:#fafbff}
.seg-bar{display:flex;height:12px;border-radius:6px;overflow:hidden;min-width:80px}
.bar-wrap{width:100%;background:#f0f2f5;border-radius:4px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px}
.star{color:#f7b731;font-size:16px}
.rank-chip{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:700}
.rank-1{background:#fff3cd;color:#856404}
.rank-hi{background:#d1e7dd;color:#0a3622}
.rank-lo{background:#f8d7da;color:#842029}
.note{font-size:12px;color:#888;font-style:italic;margin:6px 0 12px}
@media(max-width:700px){.grid2,.grid3{grid-template-columns:1fr}}
</style>
</head>

// ===== DATA HELPERS =====
function fmt(n) { return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(0)+'K':String(Math.round(n)); }
function fmtFull(n) { return Math.round(n).toLocaleString('uk-UA'); }
function pct(a,b) { return b>0?(a/b*100).toFixed(1)+'%':'—'; }
function pctN(a,b) { return b>0?+(a/b*100).toFixed(1):0; }

function filterSups(arr) { return selSuppliers ? arr.filter(s=>selSuppliers.includes(s.name)) : arr; }

function getAggData() {
  // Aggregate across selected months, filtered by suppliers
  const keys = MO_KEYS[selMonths];
  const supMap = {};
  const grpMap = {};

  keys.forEach(mo => {
    filterSups(RAW[mo].suppliers).forEach(s => {
      if (!supMap[s.name]) supMap[s.name] = {};
      const m = supMap[s.name];
      ['sr','orders','sr_promo','sr_sale','sr_cat','black_sr','kvc_sr','bnpl_sr','card_sr','cash_sr','inst_sr','buyers'].forEach(k => {
        m[k] = (m[k]||0) + (s[k]||0);
      });
      m.asp_sum = (m.asp_sum||0) + s.asp * s.orders;
      m.comp_sum = (m.comp_sum||0) + s.comp * s.sr / 100;
    });
    RAW[mo].groups.forEach(g => {
      if (!grpMap[g.name]) grpMap[g.name] = {};
      const m = grpMap[g.name];
      ['sr','orders','sr_promo','sr_sale','sr_cat','black_sr','kvc_sr','bnpl_sr','card_sr','cash_sr','inst_sr'].forEach(k => {
        m[k] = (m[k]||0) + (g[k]||0);
      });
    });
  });

  const sups = Object.entries(supMap).map(([name,m]) => ({
    name, ...m,
    asp: m.orders>0 ? Math.round(m.asp_sum/m.orders) : 0,
    comp: m.sr>0 ? +(m.comp_sum/m.sr*100).toFixed(1) : 0,
  })).sort((a,b)=>b.sr-a.sr);

  const grps = Object.entries(grpMap).map(([name,m])=>({name,...m})).sort((a,b)=>b.sr-a.sr);

  return { sups, grps };
}

function destroyChart(id) { if(charts[id]) { charts[id].destroy(); delete charts[id]; } }

function showTab(tab) {

  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
  activeTab = tab;
  renderAll();
}
function renderAll() {
  if(activeTab==='overview') renderOverview();
  if(activeTab==='promo') renderPromo();
  if(activeTab==='suppliers') renderSuppliers();
  if(activeTab==='potential') renderPotential();
  if(activeTab==='payments') renderPayments();
  if(activeTab==='segments') renderSegments();
}

// ===== SORT HELPER =====
let sortState = {};
function sortTable(tblId, col, numeric) {
  const st = sortState[tblId] || {};
  const asc = st.col===col ? !st.asc : true;
  sortState[tblId] = {col, asc};
  const tbl = document.getElementById(tblId);
  const tbody = tbl.querySelector('tbody');
  const rows = [...tbody.querySelectorAll('tr')];
  rows.sort((a,b) => {
    const av = a.children[col]?.dataset?.val ?? a.children[col]?.innerText ?? '';
    const bv = b.children[col]?.dataset?.val ?? b.children[col]?.innerText ?? '';
    const cmp = numeric ? (+av||0)-(+bv||0) : av.localeCompare(bv,'uk');
    return asc ? cmp : -cmp;
  });
  rows.forEach(r=>tbody.appendChild(r));
  tbl.querySelectorAll('th').forEach((th,i)=>{
    th.classList.remove('asc','desc');
    if(i===col) th.classList.add(asc?'asc':'desc');
  });
}

// ===== POTENTIAL / SKU =====
function renderPotential() {
  const { sups } = getAggData();
  const sku = RAW.sku;

  // Build per-supplier SR/SKU
  const rows = sups.filter(s=>s.sr>0).map(s => {
    const skuCount = sku[s.name] || 0;
    const srPerSku = skuCount>0 ? Math.round(s.sr/skuCount) : null;
    // Per month SR/SKU
    const perMo = ['jan','feb','mar'].map(mo => {
      const ms = RAW[mo].suppliers.find(x=>x.name===s.name);
      const msr = ms ? ms.sr : 0;
      return skuCount>0 ? Math.round(msr/skuCount) : null;
    });
    return { ...s, skuCount, srPerSku, perMo };
  }).sort((a,b)=> (b.srPerSku||0)-(a.srPerSku||0));

  const withSku = rows.filter(r=>r.skuCount>0);
  const maxSrSku = Math.max(...withSku.map(r=>r.srPerSku||0));

  // Stars: top 20% get star
  const q80 = withSku.map(r=>r.srPerSku||0).sort((a,b)=>a-b)[Math.floor(withSku.length*0.8)];

  const el=document.getElementById('potential');
  el.innerHTML=`
  <div class="note">💡 SR на SKU = Виторг ÷ Кількість SKU в асортименті. Чим більше — тим ефективніше "працює" кожен артикул. Корисно порівнювати постачальників подібного розміру.</div>
  <div class="grid2">
    <div class="card">
      <h3>🚀 SR на SKU — топ-20 постачальників</h3>
      <canvas id="cSkuBar" height="400"></canvas>
    </div>
    <div class="card">
      <h3>📊 Розмір асортименту vs SR</h3>
      <canvas id="cSkuScatter" height="400"></canvas>
    </div>
  </div>
  <div class="card full">
    <h3>📋 Ефективність по SKU (клікай на заголовки для сортування)</h3>
    <table id="tSku">
      <thead><tr>
        <th onclick="sortTable('tSku',0,false)">Постачальник</th>
        <th onclick="sortTable('tSku',1,true)">SKU у прайсі</th>
        <th onclick="sortTable('tSku',2,true)">SR (обр. пер.)</th>
        <th onclick="sortTable('tSku',3,true)">SR / SKU ₴</th>
        <th onclick="sortTable('tSku',4,true)">Січень SR/SKU</th>
        <th onclick="sortTable('tSku',5,true)">Лютий SR/SKU</th>
        <th onclick="sortTable('tSku',6,true)">Березень SR/SKU</th>
        <th>Ефективність</th>
        <th onclick="sortTable('tSku',8,true)">Замовлення</th>
      </tr></thead>
      <tbody>
        ${rows.map(r => {
          const rankClass = !r.skuCount ? '' : r.srPerSku>=q80 ? 'rank-hi' : r.srPerSku<q80/3 ? 'rank-lo' : '';
          const starHtml = r.srPerSku && r.srPerSku>=q80 ? '<span class="star">★</span> ' : '';
          return `<tr>
            <td>${starHtml}<b>${r.name}</b></td>
            <td data-val="${r.skuCount}">${r.skuCount>0?fmtFull(r.skuCount):'—'}</td>
            <td data-val="${r.sr}">${fmtFull(r.sr)}</td>
            <td data-val="${r.srPerSku||0}"><span class="rank-chip ${rankClass}">${r.srPerSku?fmtFull(r.srPerSku)+' ₴':'немає даних'}</span></td>
            <td data-val="${r.perMo[0]||0}">${r.perMo[0]?fmtFull(r.perMo[0]):'—'}</td>
            <td data-val="${r.perMo[1]||0}">${r.perMo[1]?fmtFull(r.perMo[1]):'—'}</td>
            <td data-val="${r.perMo[2]||0}">${r.perMo[2]?fmtFull(r.perMo[2]):'—'}</td>
            <td><div class="bar-wrap" style="width:100px"><div class="bar-fill" style="width:${r.srPerSku?Math.round(r.srPerSku/maxSrSku*100):0}%;background:${r.srPerSku>=q80?'#27ae60':'#3498db'}"></div></div></td>
            <td data-val="${r.orders}">${fmtFull(r.orders)}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
  </div>`;

  const top20=withSku.slice(0,20);
  destroyChart('cSkuBar');
  charts['cSkuBar']=new Chart(document.getElementById('cSkuBar'),{type:'bar',
    data:{labels:top20.map(r=>r.name.length>20?r.name.slice(0,18)+'…':r.name),
          datasets:[{label:'SR / SKU ₴',data:top20.map(r=>r.srPerSku),
            backgroundColor:top20.map(r=>r.srPerSku>=q80?'#27ae60':'#3498db')}]},
    options:{indexAxis:'y',responsive:true,plugins:{legend:{display:false}},
      scales:{x:{ticks:{callback:v=>fmt(v)}}}}
  });

  // Scatter: X=SKU count, Y=SR total, size=srPerSku
  const scatterData=withSku.map(r=>({x:r.skuCount,y:r.sr,label:r.name,eff:r.srPerSku}));
  destroyChart('cSkuScatter');
  charts['cSkuScatter']=new Chart(document.getElementById('cSkuScatter'),{type:'scatter',
    data:{datasets:[{
      label:'Постачальники',
      data:scatterData.map(d=>({x:d.x,y:d.y})),

    }]},
    options:{responsive:true,plugins:{
      legend:{display:false},
      tooltip:{callbacks:{label:ctx=>{
        const d=scatterData[ctx.dataIndex];
        return `${d.label}: SKU=${fmtFull(d.x)}, SR=${fmt(d.y)}, SR/SKU=${fmtFull(d.eff)}₴`;
      }}}
    },
    scales:{x:{title:{display:true,text:'Кількість SKU'},ticks:{callback:v=>fmt(v)}},
            y:{title:{display:true,text:'SR'},ticks:{callback:v=>fmt(v)}}}}
  });
}

      <thead><tr>
        <th onclick="sortTable('tSeg',0,false)">Постачальник</th>
        <th onclick="sortTable('tSeg',1,true)">SR, ₴</th>
        <th onclick="sortTable('tSeg',2,true)">🖤 Black SR</th><th onclick="sortTable('tSeg',3,true)">Black %</th>
        <th onclick="sortTable('tSeg',4,true)">💳 KVC SR</th><th onclick="sortTable('tSeg',5,true)">KVC %</th>
        <th>Black</th><th>KVC</th>
      </tr></thead>
      <tbody>
        ${sups.filter(s=>s.sr>0).map(s=>`<tr>
          <td><b>${s.name}</b></td>
          <td data-val="${s.sr}">${fmtFull(s.sr)}</td>
          <td data-val="${s.black_sr}">${fmtFull(s.black_sr)}</td><td data-val="${pctN(s.black_sr,s.sr)}">${pct(s.black_sr,s.sr)}</td>
          <td data-val="${s.kvc_sr}">${fmtFull(s.kvc_sr)}</td><td data-val="${pctN(s.kvc_sr,s.sr)}">${pct(s.kvc_sr,s.sr)}</td>
          <td><div class="bar-wrap" style="width:80px"><div class="bar-fill" style="width:${pctN(s.black_sr,s.sr)}%;background:#1a1a2e"></div></div></td>
          <td><div class="bar-wrap" style="width:80px"><div class="bar-fill" style="width:${pctN(s.kvc_sr,s.sr)}%;background:#3498db"></div></div></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>
  <div class="card full">
    <h3>📦 Black & KVC по категоріях</h3>
    <table id="tSegGrp">
      <thead><tr>
        <th onclick="sortTable('tSegGrp',0,false)">Категорія</th>
        <th onclick="sortTable('tSegGrp',1,true)">SR, ₴</th>
        <th onclick="sortTable('tSegGrp',2,true)">🖤 Black %</th>
        <th onclick="sortTable('tSegGrp',3,true)">💳 KVC %</th>
        <th>Black</th><th>KVC</th>
      </tr></thead>
      <tbody>
        ${grps.filter(g=>g.sr>0).map(g=>`<tr>
          <td><b>${g.name}</b></td>
          <td data-val="${g.sr}">${fmtFull(g.sr)}</td>
          <td data-val="${pctN(g.black_sr,g.sr)}">${pct(g.black_sr,g.sr)}</td>
          <td data-val="${pctN(g.kvc_sr,g.sr)}">${pct(g.kvc_sr,g.sr)}</td>
          <td><div class="bar-wrap" style="width:80px"><div class="bar-fill" style="width:${pctN(g.black_sr,g.sr)}%;background:#1a1a2e"></div></div></td>
          <td><div class="bar-wrap" style="width:80px"><div class="bar-fill" style="width:${pctN(g.kvc_sr,g.sr)}%;background:#3498db"></div></div></td>
        </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

  destroyChart('cBlTr');
  charts['cBlTr']=new Chart(document.getElementById('cBlTr'),{type:'line',
    data:{labels:['Січень','Лютий','Березень'],datasets:[{label:'Black %',data:blackPct,borderColor:'#1a1a2e',backgroundColor:'#1a1a2e33',tension:.3,fill:true,pointRadius:6}]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}
  });
  destroyChart('cKvTr');
  charts['cKvTr']=new Chart(document.getElementById('cKvTr'),{type:'line',
    data:{labels:['Січень','Лютий','Березень'],datasets:[{label:'KVC %',data:kvcPct,borderColor:'#3498db',backgroundColor:'#3498db33',tension:.3,fill:true,pointRadius:6}]},
    options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{min:0,max:100,ticks:{callback:v=>v+'%'}}}}
  });
}

// ===== INIT =====
renderAll();
</script>
</body>
</html>
